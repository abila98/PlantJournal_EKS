version: "3.9"

services:

  # ─────────────────────────────────────────
  # Tier 3: PostgreSQL (replaces RDS locally)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: planteks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       plantjournal
      POSTGRES_USER:     plantjournal
      POSTGRES_PASSWORD: plantjournal123
    volumes:
      - pgdata:/var/lib/postgresql/data          # persist data between restarts
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql  # auto-seeds on first run
    networks:
      - planteks-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantjournal -d plantjournal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Tier 2: Backend API (Node.js / Express)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planteks-backend
    restart: unless-stopped
    environment:
      DB_HOST:     postgres        # service name = hostname inside Docker network
      DB_PORT:     5432
      DB_NAME:     plantjournal
      DB_USER:     plantjournal
      DB_PASSWORD: plantjournal123
      DB_SSL: "false"
      S3_BUCKET:   "plantjournal-pics"       # your bucket name
      AWS_REGION:  "us-east-1"              # your region
    ports:
      - "3000:3000"               # expose for local testing: curl http://localhost:3000/api/products
    networks:
      - planteks-net
    depends_on:
      postgres:
        condition: service_healthy  # wait for postgres to be ready before starting

  # ─────────────────────────────────────────
  # Tier 1: Frontend (nginx serving HTML)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: planteks-frontend
    restart: unless-stopped
    ports:
      - "80:80"                   # open in browser: http://<EC2_PUBLIC_IP>
    networks:
      - planteks-net
    depends_on:
      - backend

# ─────────────────────────────────────────
# Shared Docker network (all 3 containers
# resolve each other by service name)
# ─────────────────────────────────────────
networks:
  planteks-net:
    driver: bridge

# ─────────────────────────────────────────
# Named volume — survives container restarts
# ─────────────────────────────────────────
volumes:
  pgdata:

